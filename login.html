<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Login | Neurotex Labs</title>
<meta name="robots" content="noindex, nofollow">

<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<section class="section" style="display:flex; justify-content:center; align-items:center; height:100vh;">

  <div class="glass" style="max-width:400px; width:100%; text-align:center;">

    <h2 style="font-family:Orbitron;">AEGIS-X ACCESS</h2>
    <p style="opacity:0.7;">Authorized Personnel Only</p>

    <form id="loginForm" class="form" style="margin-top:20px;">

      <div class="form-group">
        <input type="text" id="username" placeholder="Username" required>
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <button class="btn" id="loginBtn">Enter System</button>

    </form>

  </div>

</section>

<script src="assets/js/auth.js"></script>

</body>
</html>
